name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: nothing in CI writes to the repo, and the default token
# otherwise leaks write scope into every step (checkout persists it into
# .git/config).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      pnpm-cache: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          # v5's package-manager-cache default probes for pnpm before
          # `corepack enable` has installed it and fails the step; the
          # pnpm store is cached explicitly below instead.
          package-manager-cache: false
      - run: corepack enable
      - id: cache-key
        run: echo "value=${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ steps.cache-key.outputs.value }}
      - run: pnpm install --frozen-lockfile

  typecheck:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm lint
      # Fail the build if the feature-flag registry, docs/15, and .env.example
      # drift apart (the guard promised in src/feature-flags/registry.ts).
      - run: node scripts/check-flag-registry.mjs
      # Validate the workflow files themselves. GitHub rejects an invalid
      # workflow only when its trigger fires — deploy.yml's workflow_run
      # trigger meant a validation error surfaced only AFTER merge, as an
      # instant no-op failure on main (e.g. `secrets` is not allowed in `if:`
      # conditionals). Pinned by version + sha256.
      - name: actionlint (workflow validity)
        run: |
          curl -sLo /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          echo "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint

  test-unit:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm test:unit

  test-components:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm test:components

  test-coverage:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: coverage
          path: coverage/

  test-edge:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with: { deno-version: v1.46.3 }
      - run: deno test -A --config supabase/functions/deno.json supabase/functions

  test-db:
    runs-on: ubuntu-24.04
    needs: setup
    services:
      postgres:
        # Match production (Postgres 17; supabase/config.toml pins local to 17
        # as well) so RLS/plpgsql behaviour is tested on the engine that runs it.
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with: { deno-version: v1.46.3 }
      - name: Stub Supabase auth + storage schemas
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 -X -q -f supabase/tests/setup-stub-schemas.sql
      - name: Run schema + RLS tests against the stub
        env:
          LOCAL_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: deno run -A supabase/tests/run.ts

  build:
    runs-on: ubuntu-24.04
    needs: [typecheck, lint, test-unit, test-components]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm build
      # Source maps are emitted as 'hidden' (vite.config.ts) for upload to
      # Sentry from the deploy workflow; they must never ship in the published
      # artifact. Strip them here so the CI artifact carries no .map files.
      - name: Strip source maps from CI artifact
        run: find dist -name '*.map' -delete
      # Last line of defence against a server secret getting baked into the
      # client bundle (docs/13). The anon key is public by design; these
      # markers must never appear.
      - name: Fail if server-secret markers leaked into the bundle
        run: |
          if grep -rlE 'sk-ant-|whsec_|SUPABASE_SERVICE_ROLE_KEY|SENTRY_AUTH_TOKEN' dist/; then
            echo "Server-secret marker found in the client bundle." >&2
            exit 1
          fi
          echo "Bundle is clean."
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  migration-diff:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - name: Ensure base ref is available
        run: git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref || 'main' }}:refs/remotes/origin/${{ github.event.pull_request.base.ref || 'main' }}" || git fetch --no-tags origin main
      - name: Enforce migration policy (forward-only + new migration on schema change)
        run: node scripts/check-migration-diff.mjs "origin/${{ github.event.pull_request.base.ref || 'main' }}"

  # Single required check that gates merge: it fails unless EVERY upstream job
  # succeeded. Set this as the sole required status check in branch protection
  # so adding a job here automatically makes it blocking without touching repo
  # settings. `if: always()` ensures the job runs even when a dependency fails,
  # so we can inspect the result set and fail explicitly.
  ci-success:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - setup
      - typecheck
      - lint
      - test-unit
      - test-components
      - test-coverage
      - test-edge
      - test-db
      - migration-diff
      - build
    steps:
      - name: Verify all CI jobs succeeded
        # `skipped` must fail too: if `setup` breaks, every downstream job
        # reports `skipped` (not `failure`) and a grep for failures alone
        # would let a PR merge with zero tests run.
        run: |
          echo "Aggregated results: ${{ join(needs.*.result, ', ') }}"
          if echo "${{ join(needs.*.result, ',') }}" | grep -qE 'failure|cancelled|skipped'; then
            echo "One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs succeeded."
