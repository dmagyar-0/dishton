name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      pnpm-cache: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - id: cache-key
        run: echo "value=${{ hashFiles('pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ steps.cache-key.outputs.value }}
      - run: pnpm install --frozen-lockfile

  typecheck:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm lint
      # Fail the build if the feature-flag registry, docs/15, and .env.example
      # drift apart (the guard promised in src/feature-flags/registry.ts).
      - run: node scripts/check-flag-registry.mjs

  test-unit:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm test:unit

  test-components:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm test:components

  test-coverage:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  test-edge:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v1.46.3 }
      - run: deno test -A --config supabase/functions/deno.json supabase/functions

  test-db:
    runs-on: ubuntu-24.04
    needs: setup
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v1.46.3 }
      - name: Stub Supabase auth + storage schemas
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 -X -q -f supabase/tests/setup-stub-schemas.sql
      - name: Run schema + RLS tests against the stub
        env:
          LOCAL_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: deno run -A supabase/tests/run.ts

  build:
    runs-on: ubuntu-24.04
    needs: [typecheck, lint, test-unit, test-components]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm build
      # Source maps are emitted as 'hidden' (vite.config.ts) for upload to
      # Sentry from the deploy workflow; they must never ship in the published
      # artifact. Strip them here so the CI artifact carries no .map files.
      - name: Strip source maps from CI artifact
        run: find dist -name '*.map' -delete
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  migration-diff:
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Ensure base ref is available
        run: git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref || 'main' }}:refs/remotes/origin/${{ github.event.pull_request.base.ref || 'main' }}" || git fetch --no-tags origin main
      - name: Enforce migration policy (forward-only + new migration on schema change)
        run: node scripts/check-migration-diff.mjs "origin/${{ github.event.pull_request.base.ref || 'main' }}"

  # Single required check that gates merge: it fails unless EVERY upstream job
  # succeeded. Set this as the sole required status check in branch protection
  # so adding a job here automatically makes it blocking without touching repo
  # settings. `if: always()` ensures the job runs even when a dependency fails,
  # so we can inspect the result set and fail explicitly.
  ci-success:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - typecheck
      - lint
      - test-unit
      - test-components
      - test-coverage
      - test-edge
      - test-db
      - migration-diff
      - build
    steps:
      - name: Verify all CI jobs succeeded
        run: |
          echo "Aggregated results: ${{ join(needs.*.result, ', ') }}"
          if echo "${{ join(needs.*.result, ',') }}" | grep -qE 'failure|cancelled'; then
            echo "One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs succeeded."
