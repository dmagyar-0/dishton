name: Deploy

# Gated on CI: this fires when the CI workflow finishes for a push to main and
# only proceeds on success, so a red commit can never deploy. (Direct `push`
# triggering ran deploys in parallel with — and regardless of — CI.)
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Deploys must serialize: two quick merges previously raced `db push` /
# `functions deploy`, and the older Vercel build could finish last and win.
# cancel-in-progress stays false — never kill a deploy mid-migration.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Least privilege; all deploy credentials are dedicated secrets, not the token.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    # The `secrets` context is NOT available in `if:` conditionals (GitHub
    # validation rejects the whole workflow file). Expose a boolean flag at
    # job scope instead — the actual token stays scoped to the single Sentry
    # step's env below.
    env:
      HAS_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Deploy exactly the commit CI validated, not whatever main points
          # at by the time this job runs.
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: 22, package-manager-cache: false }
      - run: corepack enable && pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v1.7.1 (node20 — repo was merged into supabase/cli; newer tags are not resolvable action refs)
        with: { version: 2.99.0 }
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}

      - name: Apply migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Materialize shared domain into functions tree
        # supabase/functions/_shared/domain is a symlink → src/domain. The
        # functions-deploy upload only includes supabase/functions, so the
        # symlink target falls outside the bundle and Deno fails the graph
        # build with "Module not found". Replace with a real copy at deploy.
        run: |
          rm -f supabase/functions/_shared/domain
          cp -R src/domain supabase/functions/_shared/domain

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Vercel prebuilt deploy: pull project settings, run the build on the
      # runner (so Vercel skips its server-side build), strip source maps
      # from the artifact, then upload it as-is.
      # Pinned: vercel@53.3.0 declares a dependency on @vercel/koa@0.1.57,
      # which was never published to npm (registry jumps 0.1.56 → canary),
      # so `vercel@latest` fails to install. Bump deliberately when a
      # known-good release is available.
      - name: Pull Vercel project settings
        run: npx --yes vercel@53.2.0 pull --yes --environment=production --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # `vercel build` resets the build subprocess env from
      # .vercel/.env.production.local (what `vercel pull` just wrote) and
      # ignores anything in this step's env: block. Append the vars we
      # need at build time so Vite bakes them into the bundle. Repeated
      # keys are fine — dotenv keeps the last value.
      - name: Inject build-time env vars
        run: |
          cat >> .vercel/.env.production.local <<EOF
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_RELEASE_SHA=${{ github.event.workflow_run.head_sha }}
          VITE_SENTRY_DSN_FRONTEND=${{ secrets.SENTRY_DSN_FRONTEND }}
          EOF

      - name: Build with Vercel
        run: npx --yes vercel@53.2.0 build --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Upload source maps to Sentry for this release BEFORE stripping them from
      # the artifact. Vite emits 'hidden' source maps (no sourceMappingURL in
      # the shipped JS), so they are uploaded here and never served to the
      # browser. Skipped cleanly when SENTRY_AUTH_TOKEN is absent so an
      # un-configured environment still deploys. The token is scoped to this
      # single step — npx-fetched CLIs in other steps never see it.
      - name: Upload source maps to Sentry
        if: ${{ env.HAS_SENTRY_AUTH_TOKEN == 'true' }}
        run: |
          npx --yes @sentry/cli@2.58.6 sourcemaps inject .vercel/output
          npx --yes @sentry/cli@2.58.6 sourcemaps upload \
            --release "${{ github.event.workflow_run.head_sha }}" \
            .vercel/output
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Strip source maps from deploy artifact
        run: find .vercel/output -name '*.map' -delete

      # Mirror of the CI bundle gate, against the artifact that actually ships.
      - name: Fail if server-secret markers leaked into the artifact
        run: |
          if grep -rlE 'sk-ant-|whsec_|SUPABASE_SERVICE_ROLE_KEY|SENTRY_AUTH_TOKEN' .vercel/output; then
            echo "Server-secret marker found in the deploy artifact." >&2
            exit 1
          fi
          echo "Artifact is clean."

      - name: Deploy prebuilt to Vercel
        id: vercel-deploy
        # stdout carries the deployment-specific URL; the production alias is
        # printed on stderr ("Aliased: https://…"). The smoke check must hit
        # the ALIAS — deployment URLs sit behind Vercel deployment protection
        # and answer 401 to anonymous probes (observed on run 27326308634).
        run: |
          deploy_log="$(mktemp)"
          url="$(npx --yes vercel@53.2.0 deploy --prebuilt --prod --token "$VERCEL_TOKEN" 2>"$deploy_log")"
          cat "$deploy_log"
          alias_url="$(grep -oE 'Aliased: +https://[^ ]+' "$deploy_log" | head -1 | awk '{print $2}')"
          echo "deployed: $url (alias: ${alias_url:-none})"
          echo "url=${alias_url:-$url}" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke-check the deployment
        # Minimal post-deploy probe: the SPA shell must come back 200 with the
        # React mount point. Retries cover Vercel's propagation lag.
        run: |
          url="${{ steps.vercel-deploy.outputs.url }}"
          for attempt in 1 2 3 4 5; do
            if curl -fsS --max-time 15 "$url" | grep -q 'id="root"'; then
              echo "Smoke check passed."
              exit 0
            fi
            echo "Smoke attempt ${attempt} failed; retrying in 10s..." >&2
            sleep 10
          done
          echo "Smoke check failed for $url" >&2
          exit 1
