name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable && pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}

      - name: Apply migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Materialize shared domain into functions tree
        # supabase/functions/_shared/domain is a symlink → src/domain. The
        # functions-deploy upload only includes supabase/functions, so the
        # symlink target falls outside the bundle and Deno fails the graph
        # build with "Module not found". Replace with a real copy at deploy.
        run: |
          rm -f supabase/functions/_shared/domain
          cp -R src/domain supabase/functions/_shared/domain

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Vercel prebuilt deploy: pull project settings, run the build on the
      # runner (so Vercel skips its server-side build), strip source maps
      # from the artifact, then upload it as-is.
      # Pinned: vercel@53.3.0 declares a dependency on @vercel/koa@0.1.57,
      # which was never published to npm (registry jumps 0.1.56 → canary),
      # so `vercel@latest` fails to install. Bump deliberately when a
      # known-good release is available.
      - name: Pull Vercel project settings
        run: npx --yes vercel@53.2.0 pull --yes --environment=production --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # `vercel build` resets the build subprocess env from
      # .vercel/.env.production.local (what `vercel pull` just wrote) and
      # ignores anything in this step's env: block. Append the vars we
      # need at build time so Vite bakes them into the bundle. Repeated
      # keys are fine — dotenv keeps the last value.
      - name: Inject build-time env vars
        run: |
          cat >> .vercel/.env.production.local <<EOF
          VITE_RELEASE_SHA=${{ github.sha }}
          VITE_SENTRY_DSN_FRONTEND=${{ secrets.SENTRY_DSN_FRONTEND }}
          EOF

      - name: Build with Vercel
        run: npx --yes vercel@53.2.0 build --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Strip source maps from deploy artifact
        run: find .vercel/output -name '*.map' -delete

      - name: Deploy prebuilt to Vercel
        run: npx --yes vercel@53.2.0 deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
