# Automated dependency update proposals. CI (--frozen-lockfile) means nothing
# updates without a PR — without this, security patches arrive only when
# someone remembers to bump by hand.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
